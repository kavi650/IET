<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Testiny Testing Software{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="{{ testing_base }}/static/testing/testing.css">
    <!-- Apply saved theme before render to prevent flash -->
    <script>(function(){var t=localStorage.getItem('testiny_theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
    {% block head %}{% endblock %}
</head>

<body>

    <!-- Mobile sidebar overlay -->
    <div class="t-sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- SIDEBAR -->
    <aside class="t-sidebar" id="sidebar">
        <div class="t-sidebar-brand">
            <div class="t-brand-icon"><i class="fas fa-atom"></i></div>
            <div class="t-brand-text">
                <span class="t-brand-name">TESTINY</span>
                <span class="t-brand-sub">Testing Software</span>
            </div>
        </div>

        <nav class="t-nav">
            <a href="{{ testing_base }}/dashboard" class="t-nav-item {% if active == 'dashboard' %}active{% endif %}">
                <i class="fas fa-gauge-high"></i><span>Dashboard</span>
            </a>
            <a href="{{ testing_base }}/live" class="t-nav-item {% if active == 'live' %}active{% endif %}">
                <i class="fas fa-circle-dot"></i><span>Live Test</span>
                <span class="t-live-badge" id="liveIndicator" style="display:none">LIVE</span>
            </a>
            <a href="{{ testing_base }}/analysis" class="t-nav-item {% if active == 'analysis' %}active{% endif %}">
                <i class="fas fa-chart-line"></i><span>Analysis</span>
            </a>
            <a href="{{ testing_base }}/results" class="t-nav-item {% if active == 'results' %}active{% endif %}">
                <i class="fas fa-clipboard-check"></i><span>Results</span>
            </a>
            <a href="{{ testing_base }}/ai-assistant" class="t-nav-item {% if active == 'ai' %}active{% endif %}">
                <i class="fas fa-microchip"></i><span>AI Assistant</span>
            </a>
            <a href="{{ testing_base }}/logs" class="t-nav-item {% if active == 'logs' %}active{% endif %}">
                <i class="fas fa-list-check"></i><span>Logs</span>
            </a>
            <a href="{{ testing_base }}/settings" class="t-nav-item {% if active == 'settings' %}active{% endif %}">
                <i class="fas fa-sliders"></i><span>Settings</span>
            </a>

            <div style="height:1px;background:rgba(255,255,255,.07);margin:12px 16px"></div>

            <a href="{{ testing_base }}/access" class="t-nav-item {% if active == 'access' %}active{% endif %}">
                <i class="fas fa-key"></i><span>Access</span>
            </a>
            <a href="{{ testing_base }}/access/request" class="t-nav-item {% if active == 'request' %}active{% endif %}">
                <i class="fas fa-paper-plane"></i><span>Request</span>
            </a>

            <div style="height:1px;background:rgba(255,255,255,.07);margin:12px 16px"></div>

            <a href="/" class="t-nav-item" style="color:rgba(180,210,255,.5);">
                <i class="fas fa-arrow-left"></i><span>Back to Home</span>
            </a>
        </nav>

        <div class="t-sidebar-footer">
            <div class="t-machine-status">
                <span class="t-status-dot" id="machineStatusDot"></span>
                <span id="machineStatusText">Checking…</span>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="t-main">
        <header class="t-topbar">
            <div class="t-topbar-left">
                <button class="t-menu-toggle" id="menuToggle"
                    onclick="toggleSidebar()">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="t-page-title">{% block page_title %}Dashboard{% endblock %}</div>
            </div>
            <div class="t-topbar-right">
                <div class="t-time" id="topbarTime"></div>
                <!-- Theme Toggle -->
                <button id="themeToggle" onclick="toggleTheme()"
                    title="Toggle light/dark theme"
                    style="background:none;border:1px solid #1a3050;border-radius:8px;padding:6px 10px;
                           cursor:pointer;font-size:14px;display:flex;align-items:center;gap:6px;
                           transition:all .2s ease">
                    <i id="themeIcon" class="fas fa-moon" style="color:#00c8ff"></i>
                    <span id="themeLabel" style="font-size:11px;font-weight:700;letter-spacing:.5px;color:#00c8ff">DARK</span>
                </button>
                <div class="t-operator-badge"><i class="fas fa-user-helmet-safety"></i> Operator</div>
            </div>
        </header>

        <div class="t-content">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script>
        // ── Theme: apply saved preference BEFORE render to prevent flash ──
        (function(){
            const saved = localStorage.getItem('testiny_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
        })();

        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme') || 'dark';
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('testiny_theme', next);
            updateThemeBtn(next);
        }

        function updateThemeBtn(theme) {
            const icon  = document.getElementById('themeIcon');
            const label = document.getElementById('themeLabel');
            const btn   = document.getElementById('themeToggle');
            if (!icon) return;
            if (theme === 'light') {
                icon.className  = 'fas fa-sun';
                icon.style.color = '#d97706';
                label.textContent = 'LIGHT';
                label.style.color = '#d97706';
                btn.style.borderColor = '#fde68a';
            } else {
                icon.className  = 'fas fa-moon';
                icon.style.color = '#00c8ff';
                label.textContent = 'DARK';
                label.style.color = '#00c8ff';
                btn.style.borderColor = '#1a3050';
            }
        }

        // Apply button state on load
        document.addEventListener('DOMContentLoaded', () => {
            updateThemeBtn(localStorage.getItem('testiny_theme') || 'dark');
        });

        // Live clock
        setInterval(() => {
            document.getElementById('topbarTime').textContent =
                new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }, 1000);

        // ── Sidebar toggle (desktop: collapse / mobile: drawer) ──
        function isMobile() { return window.innerWidth <= 900; }

        function toggleSidebar() {
            const sidebar  = document.getElementById('sidebar');
            const overlay  = document.getElementById('sidebarOverlay');
            if (isMobile()) {
                sidebar.classList.toggle('open');
                overlay.classList.toggle('visible');
            } else {
                sidebar.classList.toggle('collapsed');
            }
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('visible');
        }

        // Close drawer on resize back to desktop
        window.addEventListener('resize', () => {
            if (window.innerWidth > 900) {
                closeSidebar();
            }
        });
        (function () {
            const params = new URLSearchParams(window.location.search);
            const t = params.get('token');
            if (t) {
                sessionStorage.setItem('testiny_token', t);
                history.replaceState({}, '', window.location.pathname);
            }
        })();

        // TESTING_BASE: auto-detected from Flask's SCRIPT_NAME (set by DispatcherMiddleware)
        // '/testing' when running via combined_app, '' when standalone
        const TESTING_BASE = '{{ testing_base }}';

        // Token from sessionStorage
        window.AUTH_TOKEN = sessionStorage.getItem('testiny_token') || '';

        // Authenticated fetch helper — prepends TESTING_BASE automatically
        async function apiFetch(url, opts = {}) {
            opts.headers = { ...(opts.headers || {}), 'Authorization': `Bearer ${window.AUTH_TOKEN}`, 'Content-Type': 'application/json' };
            const res = await fetch(TESTING_BASE + url, opts);
            if (res.status === 401) {
                sessionStorage.removeItem('testiny_token');
                window.location.href = TESTING_BASE + '/access';
                return res;
            }
            return res;
        }
    </script>
    {% block scripts %}{% endblock %}
</body>

</html>
